             >\n                  <link.icon className=\"w-5 h-5\" />\n                  {link.name}\n                </Link>\n              ))}\n            </div>\n          </motion.div>\n        )}\n      </AnimatePresence>\n    </nav>\n  );\n};\n\nexport default Navbar;","/pages/Biography.jsx":"import { motion } from \"framer-motion\";\n\nconst Biography = () => {\n  const events = [\n    {\n      year: \"1898\",\n      title: \"الميلاد والنشأة\",\n      desc: \"ولدت فاطمة إبراهيم البلتاجي في قرية 'طماي الزهايرة' بمحافظة الدقهلية. بدأت الغناء وهي طفلة مع أبناء عمومتها في الموالد بزي بدوي كغلام.\"\n    },\n    {\n      year: \"1923\",\n      title: \"الانتقال إلى القاهرة\",\n      desc: \"نقطة التحول الكبرى بلقائها بالشيخ أبو العلا محمد والموسيقار محمد القصبجي، وتأسيس فرقتها الخاصة.\"\n    },\n    {\n      year: \"1940-1950\",\n      title: \"العصر الذهبي\",\n      desc: \"تربعت على عرش الغناء، تلاحمت مع قضايا الوطن، وبدأت حفلات الخميس الشهيرة التي كان العالم العربي ينصت لها من المحيط إلى الخليج.\"\n    },\n    {\n      year: \"1967\",\n      title: \"المجهود الحربي\",\n      desc: \"قادت حملة عالمية لجمع التبرعات من أجل إعادة إعمار مصر بعد النكسة، غنت في باريس والعديد من العواصم العربية.\"\n    },\n    {\n      year: \"1975\",\n      title: \"الرحيل الخالد\",\n      desc: \"ودعها الملايين في واحدة من أكبر الجنازات في التاريخ المعاصر، لتبقى ذكراها حية في كل بيت عربي.\"\n    }\n  ];\n\n  return (\n    <div className=\"py-20 bg-stone-50\">\n      <div className=\"container mx-auto px-4 max-w-4xl\">\n        <header className=\"text-center mb-20\">\n          <h1 className=\"text-4xl md:text-5xl font-serif font-bold mb-6 text-stone-900\">سيرة ومسيرة</h1>\n          <div className=\"w-24 h-1 bg-amber-600 mx-auto\"></div>\n        </header>\n\n        <div className=\"relative border-r-2 border-amber-900/10 pr-8 space-y-16\">\n          {events.map((event, idx) => (\n            <motion.div \n              key={idx}\n              initial={{ opacity: 0, x: 20 }}\n              whileInView={{ opacity: 1, x: 0 }}\n              viewport={{ once: true }}\n              className=\"relative\"\n            >\n              {/* Dot */}\n              <div className=\"absolute -right-[41px] top-0 w-5 h-5 bg-amber-600 rounded-full border-4 border-stone-50\"></div>\n              \n              <div className=\"bg-white p-8 rounded-2xl shadow-lg border border-stone-100\">\n                <span className=\"inline-block px-4 py-1 bg-amber-100 text-amber-800 rounded-full text-lg font-bold mb-4\">\n                  {event.year}\n                </span>\n                <h3 className=\"text-2xl font-bold mb-4 text-stone-800\">{event.title}</h3>\n                <p className=\"text-stone-600 leading-relaxed text-lg italic\">\n                  {event.desc}\n                </p>\n              </div>\n            </motion.div>\n          ))}\n        </div>\n\n        <div className=\"mt-24 p-12 bg-stone-900 text-white rounded-3xl relative overflow-hidden\">\n          <div className=\"relative z-10\">\n            <h2 className=\"text-3xl font-serif mb-6\">أثر لا ينمحي</h2>\n            <p className=\"text-stone-400 text-lg leading-loose mb-8\">\n              لم تكن أم كلثوم مجرد مطربة، بل كانت ظاهرة ثقافية واجتماعية وسياسية. استطاعت بصوتها أن توحد الشعوب العربية، وكانت حفلاتها تعطل حركة المرور في كبرى العواصم. تميزت بدقة اختيار الكلمات (أحمد شوقي، بيرم التونسي) والألحان (السنباطي، بليغ حمدي، عبد الوهاب).\n            </p>\n          </div>\n          <div className=\"absolute bottom-0 left-0 opacity-10 translate-y-1/2 -translate-x-1/2\">\n             <span className=\"text-[200px] font-serif font-bold\">كلثوم</span>\n          </div>\n        </div>\n      </div>\n    </div>\n  );\n};\n\nexport default Biography;","/pages/Gallery.jsx":"import { motion } from \"framer-motion\";\n\nconst Gallery = () => {\n  const images = [\n    { url: \"https://images.unsplash.com/photo-1514320298324-a4a27858ad35?q=80&w=800\", title: \"في حوار صحفي\", d ansparent to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-500 flex flex-col justify-end p-8\">\n                <h3 className=\"text-xl font-bold text-amber-400\">{img.title}</h3>\n                <p className=\"text-stone-300 text-sm mt-1\">{img.desc}</p>\n              </div>\n            </motion.div>\n          ))}\n        </div>\n\n        <div className=\"mt-20 p-12 bg-amber-900/10 border border-amber-900/30 rounded-3xl text-center\">\n          <h2 className=\"text-2xl font-bold mb-4\">هل لديك صور نادرة؟</h2>\n          <p className=\"text-stone-400 mb-8 max-w-2xl mx-auto\">نحن نسعى لجمع أكبر أرشيف رقمي للسيدة أم كلثوم. إذا كنت تمتلك مقتنيات أو صوراً نادرة، يسعدنا تواصلك معنا لإدراجها في المعرض الرقمي.</p>\n          <button className=\"px-10 py-4 bg-amber-600 hover:bg-amber-700 rounded-full font-bold transition-all\">تواصل معنا الآن</button>\n        </div>\n      </div>\n    </div>\n  );\n};\n\nexport default Gallery;","/components/Footer.jsx":"import { Mail, Github, Twitter, Facebook, Youtube, Heart } from \"lucide-react\";\nimport { Link } from \"react-router-dom\";\n\nconst Footer = () => {\n  return (\n    <footer className=\"bg-stone-950 text-stone-400 py-16 border-t border-stone-800\">\n      <div className=\"container mx-auto px-4\">\n        <div className=\"grid grid-cols-1 md:grid-cols-4 gap-12 mb-16\">\n          <div className=\"col-span-1 md:col-span-2\">\n            <Link to=\"/\" className=\"flex items-center gap-3 mb-6\">\n              <div className=\"w-8 h-8 bg-amber-600 rounded-full flex items-center justify-center\">\n                <span className=\"text-white font-serif font-bold\">أ</span>\n              </div>\n              <span className=\"text-xl font-bold tracking-wider font-serif text-white\">كوكب الشرق</span>\n            </Link>\n            <p className=\"leading-loose max-w-md text-stone-500 italic\">\n              منصة رقمية مكرسة لإرث سيدة الغناء العربي \"أم كلثوم\"، نهدف من خلالها إلى تقديم أرشيف يليق بمكانتها الرفيعة في تاريخ الفن الإنساني.\n            </p>\n          </div>\n          \n          <div>\n            <h4 className=\"text-white font-bold mb-6\">روابط سريعة</h4>\n            <ul className=\"space-y-4\">\n              <li><Link to=\"/biography\" className=\"hover:text-amber-500 transition-colors\">السيرة الذاتية</Link></li>\n              <li><Link to=\"/songs\" className=\"hover:text-amber-500 transition-colors\">أرشيف الأغاني</Link></li>\n              <li><Link to=\"/gallery\" className=\"hover:text-amber-500 transition-colors\">معرض الصور</Link></li>\n              <li><Link to=\"/\" className=\"hover:text-amber-500 transition-colors\">الرئيسية</Link></li>\n            </ul>\n          </div>\n\n          <div>\n            <h4 className=\"text-white font-bold mb-6\">تابعونا</h4>\n            <div className=\"flex gap-4\">\n              {[Twitter, Facebook, Youtube].map((Icon, idx) => (\n                <a key={idx} href=\"#\" className=\"w-10 h-10 bg-stone-900 rounded-full flex items-center justify-center hover:bg-amber-600 hover:text-white transition-all transform hover:-translate-y-1\">\n                  <Icon className=\"w-5 h-5\" />\n                </a>\n              ))}\n            </div>\n            <div className=\"mt-8\">\n              <h5 className=\"text-sm font-bold text-stone-500 mb-4\">نشرة الموقع الأخبارية</h5>\n              <div className=\"flex bg-stone-900 rounded-lg p-1 border border-stone-800\">\n                <input type=\"email\" placeholder=\"بريدك...\" className=\"bg-transparent border-none focus:ring-0 text-sm px-3 flex-1\" />\n                <button className=\"bg-amber-600 text-white px-4 py-2 rounded-md hover:bg-amber-700 text-sm transition-colors\">اشترك</button>\n              </div>\n            </div>\n          </div>\n        </div>\n\n        <div className=\"flex flex-col md:flex-row justify-between items-center py-8 border-t border-stone-900 text-sm\">\n          <p>© {new Date().getFullYear()} جميع الحقوق التصميمية محفوظة لمشروع كوكب الشرق الرقمي.</p>\n          <p className=\"flex items-center gap-1 mt-4 md:mt-0\">\n            بني بكل <Heart className=\"w-4 h-4 text-red-500 fill-current\" /> لعشاق الفن الأصيل.\n          </p>\n        </div>\n      </div>\n    </footer>\n  );\n};\n\nexport default Footer;","/pages/NotFound.jsx":"import { Link } from \"react-router-dom\";\nimport { MoveLeft } from \"lucide-react\";\n\nconst NotFound = () => {\n  return (\n    <div className=\"min-h-[70vh] flex items-center justify-center text-center p-4\">\n      <div>\n        <h1 className=\"text-[120px] font-serif font-black text-stone-200\">٤٠٤</h1>\n        <h2 className=\"text-3xl font-bold -mt-10 mb-6\">آه يا حبيبي.. الصفحة تاهت</h2>\n        <p className=\"text-stone-500 mb-10 text-lg\">يبدو أن الصفحة التي تبحث عنها قد غنت بغير كلماتنا.</p>\n        <Link \n          to=\"/\" \n          className=\"inline-flex items-center gap-2 px-8 py-4 bg-amber-600 text-white rounded-full font-bold hover:bg-amber-700 transition-all group\"\n        >\n          <MoveLeft className=\"w-5 h-5 group-hover:-translate-x-2 transition-transform\" />\n          العودة للرئيسية\n        </Link>\n      </div>\n    </div>\n  );\n};\n\nexport default NotFound;"};
  const ENTRY = "/main.jsx";
  const moduleCache = Object.create(null);

  function tryResolve(path) {
    if (FILES[path] !== undefined) return path;
    for (const ext of ['.jsx', '.tsx', '.js', '.ts', '.css']) {
      if (FILES[path + ext] !== undefined) return path + ext;
    }
    for (const ext of ['.jsx', '.tsx', '.js', '.ts']) {
      if (FILES[path + '/index' + ext] !== undefined) return path + '/index' + ext;
    }
    return null;
  }

  function resolvePath(from, spec) {
    // External (bare) — handled via importmap
    if (!spec.startsWith('.') && !spec.startsWith('/')) return null;
    const base = from.replace(/[^/]+$/, '');
    const raw = spec.startsWith('/') ? spec : (base + spec);
    const segs = [];
    for (const s of raw.split('/')) {
      if (s === '' || s === '.') continue;
      if (s === '..') segs.pop();
      else segs.push(s);
    }
    return tryResolve('/' + segs.join('/'));
  }

  function transformJs(code, path) {
    const presets = [['react', { runtime: 'classic' }]];
    if (/\.tsx?$/.test(path)) presets.push(['typescript', { allExtensions: true, isTSX: true }]);
    return Babel.transform(code, {
      presets, plugins: [], filename: path, sourceType: 'module',
    }).code;
  }

  // CSS imports → JS module that injects a <style> tag and exports {}
  function makeCssModule(cssText, path) {
    const safe = JSON.stringify(cssText);
    return [
      "const __css = " + safe + ";",
      "const __style = document.createElement('style');",
      "__style.setAttribute('data-webly-css', " + JSON.stringify(path) + ");",
      "__style.textContent = __css;",
      "document.head.appendChild(__style);",
      "export default __css;",
    ].join('\n');
  }

  // Match import / export-from / dynamic import statements (handles single + double quotes)
  const IMPORT_RE = /(\bimport\s+(?:[\w*\s{},$]+\s+from\s+)?|\bexport\s+\*\s+from\s+|\bexport\s+\{[^}]*\}\s+from\s+|\bimport\s*\(\s*)(["'])([^"']+)(\2)/g;

  async function loadModule(path) {
    if (moduleCache[path]) return moduleCache[path];
    const src = FILES[path];
    if (src === undefined) throw new Error('Module not found: ' + path);

    let code;
    if (path.endsWith('.css')) {
      code = makeCssModule(src, path);
    } else {
      code = transformJs(src, path);

      // Find every relative dep and pre-load it
      const deps = [];
      let m;
      const re = new RegExp(IMPORT_RE.source, 'g');
      while ((m = re.exec(code)) !== null) {
        const spec = m[3];
        const resolved = resolvePath(path, spec);
        if (resolved) deps.push({ spec, resolved });
      }
      const depUrls = {};
      for (const d of deps) {
        depUrls[d.spec] = await loadModule(d.resolved);
      }
      const re2 = new RegExp(IMPORT_RE.source, 'g');
      code = code.replace(re2, function(_full, prefix, q, spec, q2){
        if (depUrls[spec]) return prefix + q + depUrls[spec] + q2;
        return _full;
      });
    }

    const blob = new Blob([code], { type: 'text/javascript' });
    const url = URL.createObjectURL(blob);
    moduleCache[path] = url;
    return url;
  }

  (async () => {
    try {
      const entryUrl = await loadModule(ENTRY);
      await import(entryUrl);
    } catch (err) {
      console.error('[Webly]', err);
      const msg = (err && err.stack) ? err.stack : String(err);
      document.getElementById('root').innerHTML =
        '<div style="padding:24px;font-family:ui-monospace,monospace;direction:ltr;text-align:left;min-height:100vh;background:#0f172a">' +
        '<h2 style="color:#f87171;margin:0 0 12px">Webly Runtime Error</h2>' +
        '<pre style="white-space:pre-wrap;color:#fecaca;background:#1e293b;padding:16px;border-radius:8px;border:1px solid #b91c1c;font-size:13px">' +
        msg.replace(/[&<>]/g, function(c){ return ({ '&':'&amp;','<':'&lt;','>':'&gt;' })[c]; }) +
        '</pre></div>';
    }
  })();
</script>
