sktop Links */}\n          <div className=\"hidden md:flex items-center space-x-reverse space-x-8\">\n            {links.map((link) => (\n              <Link\n                key={link.path}\n                to={link.path}\n                className={`text-lg transition-colors hover:text-white ${\n                  isActive(link.path) ? 'border-b-2 border-[#C5A059] text-white' : ''\n                }`}\n              >\n                {link.name}\n              </Link>\n            ))}\n          </div>\n\n          {/* Mobile Toggle */}\n          <div className=\"md:hidden\">\n            <button onClick={() => setIsOpen(!isOpen)} className=\"p-2\">\n              {isOpen ? <X size={28} /> : <Menu size={28} />}\n            </button>\n          </div>\n        </div>\n      </div>\n\n      {/* Mobile Menu */}\n      {isOpen && (\n        <div className=\"md:hidden bg-[#1a1a1a] border-t border-[#C5A059]/20 p-4 space-y-4\">\n          {links.map((link) => (\n            <Link\n              key={link.path}\n              to={link.path}\n              onClick={() => setIsOpen(false)}\n              className=\"block text-xl text-center py-2\"\n            >\n              {link.name}\n            </Link>\n          ))}\n        </div>\n      )}\n    </nav>\n  );\n};\n\nexport default Navbar;\n","/components/Footer.jsx":"import React from 'react';\nimport { Mail, Phone, Instagram, Facebook, Youtube } from 'lucide-react';\n\nconst Footer = () => {\n  return (\n    <footer className=\"bg-[#1a1a1a] text-white pt-20 pb-10\">\n      <div className=\"max-w-7xl mx-auto px-4 grid grid-cols-1 md:grid-cols-3 gap-16 mb-20\">\n        <div>\n          <h4 className=\"text-[#C5A059] text-xl font-bold mb-6 italic\">عن المنصة</h4>\n          <p className=\"text-gray-400 leading-relaxed\">\n            مشروع رقمي يهدف لتوثيق وحفظ تراث السيدة أم كلثوم الفني والثقافي للأجيال القادمة، ليبقى فنها حياً في ذاكرة التاريخ العربي.\n          </p>\n        </div>\n        \n        <div>\n        <Music className=\"w-24 h-24 text-[#C5A059] animate-bounce\" />\n        </div>\n      </div>\n      <h2 className=\"text-3xl font-bold text-[#1a1a1a] mb-4\">عذراً، هذه الصفحة رحلت..</h2>\n      <p className=\"text-gray-600 mb-8 max-w-md mx-auto leading-relaxed\">\n        لكن صوت الست باقٍ معنا دائماً. ربما أضعت الطريق في أروقة الفن الجميل، دعنا نعد للمسرح الرئيسي.\n      </p>\n      <Link \n        to=\"/\" \n        className=\"bg-[#1a1a1a] text-[#C5A059] px-8 py-3 rounded-none font-bold hover:bg-[#C5A059] hover:text-[#1a1a1a] transition-all\"\n      >\n        العودة للرئيسية\n      </Link>\n    </div>\n  );\n};\n\nexport default NotFound;\n","/pages/Biography.jsx":"import React from 'react';\nimport { motion } from 'framer-motion';\n\nconst Biography = () => {\n  const events = [\n    { year: \"1898\", title: \"الميلاد\", desc: \"ولدت فاطمة بنت الشيخ إبراهيم البلتاجي في قرية طماي الزهايرة بمركز السنبلاوين.\" },\n    { year: \"1923\", title: \"الرحيل للقاهرة\", desc: \"انتقلت للقاهرة لتبدأ مسيرتها الاحترافية بمساعدة الشيخ أبو العلا محمد.\" },\n    { year: \"1934\", title: \"الإذاعة المصرية\", desc: \"كانت أول من غنى في الإذاعة المصرية عند افتتاحها بصوتها الساحر.\" },\n    { year: \"1964\", title: \"لقاء السحاب\", desc: \"أول تعاون مع الموسيقار محمد عبد الوهاب في أغنية (إنت عمري).\" },\n    { year: \"1975\", title: \"الوداع\", desc: \"رحلت عن عالمنا تاركة خلفها إرثاً فنياً لم ولن يتكرر في تاريخ الموسيقى.\" },\n  ];\n\n  return (\n    <div className=\"bg-white min-h-screen\">\n      <div className=\"bg-[#1a1a1a] text-white py-24 px-4 text-center\">\n        <h1 className=\"text-5xl font-bold mb-6\">رحلة الخلود</h1>\n        <p className=\"text-gray-400 max-w-2xl mx-auto text-xl\">من طفولة قروية بسيطة إلى أن أصبحت رمزاً وطنياً وفنياً عابراً للقارات.</p>\n      </div>\n\n      <div className=\"max-w-4xl mx-auto py-24 px-4\">\n        <div className=\"relative\">\n          {/* Vertical Line */}\n          <div className=\"absolute right-0 md:right-1/2 top-0 bottom-0 w-px bg-[#C5A059]/30 mr-4 md:mr-0\"></div>\n\n          {events.map((event, idx) => (\n            <motion.div \n              initial={{ opacity: 0, x: idx % 2 === 0 ? 50 : -50 }}\n              whileInView={{ opacity: 1, x: 0 }}\n              viewport={{ once: true }}\n              key={idx}\n              className={`relative mb-20 flex items-center justify-between w-full ${idx % 2 === 0 ? 'md:flex-row-reverse' : ''}`}\n            >\n              {/* Content */}\n              <div className=\"w-full md:w-[45%] pr-12 md:pr-0\">\n                <div className=\"bg-[#FAF9F6] p-8 border-l-4 border-[#C5A059] shadow-md\">\n                  <span className=\"text-[#C5A059] font-black text-2xl mb-2 block\">{event.year}</span>\n                  <h3 className=\"text-2xl font-bold text-gray-800 mb-3\">{event.title}</h3>\n                  <p className=\"text-gray-600 leading-loose\">{event.desc}</p>\n                </div>\n              </div>\n\n              {/* Dot */}\n              <div className=\"absolute right-0 md:right-1/2 w-8 h-8 bg-[#1a1a1a] border-4 border-[#C5A059] rounded-full translate-x-1/2 z-10 hidden md:block\"></div>\n              \n              <div className=\"hidden md:block w-[45%]\"></div>\n            </motion.div>\n          ))}\n        </div>\n      </div>\n    </div>\n  );\n};\n\nexport default Biography;\n"};
  const ENTRY = "/main.jsx";
  const moduleCache = Object.create(null);

  function tryResolve(path) {
    if (FILES[path] !== undefined) return path;
    for (const ext of ['.jsx', '.tsx', '.js', '.ts', '.css']) {
      if (FILES[path + ext] !== undefined) return path + ext;
    }
    for (const ext of ['.jsx', '.tsx', '.js', '.ts']) {
      if (FILES[path + '/index' + ext] !== undefined) return path + '/index' + ext;
    }
    return null;
  }

  function resolvePath(from, spec) {
    // External (bare) — handled via importmap
    if (!spec.startsWith('.') && !spec.startsWith('/')) return null;
    const base = from.replace(/[^/]+$/, '');
    const raw = spec.startsWith('/') ? spec : (base + spec);
    const segs = [];
    for (const s of raw.split('/')) {
      if (s === '' || s === '.') continue;
      if (s === '..') segs.pop();
      else segs.push(s);
    }
    return tryResolve('/' + segs.join('/'));
  }

  function transformJs(code, path) {
    const presets = [['react', { runtime: 'classic' }]];
    if (/\.tsx?$/.test(path)) presets.push(['typescript', { allExtensions: true, isTSX: true }]);
    return Babel.transform(code, {
      presets, plugins: [], filename: path, sourceType: 'module',
    }).code;
  }

  // CSS imports → JS module that injects a <style> tag and exports {}
  function makeCssModule(cssText, path) {
    const safe = JSON.stringify(cssText);
    return [
      "const __css = " + safe + ";",
      "const __style = document.createElement('style');",
      "__style.setAttribute('data-webly-css', " + JSON.stringify(path) + ");",
      "__style.textContent = __css;",
      "document.head.appendChild(__style);",
      "export default __css;",
    ].join('\n');
  }

  // Match import / export-from / dynamic import statements (handles single + double quotes)
  const IMPORT_RE = /(\bimport\s+(?:[\w*\s{},$]+\s+from\s+)?|\bexport\s+\*\s+from\s+|\bexport\s+\{[^}]*\}\s+from\s+|\bimport\s*\(\s*)(["'])([^"']+)(\2)/g;

  async function loadModule(path) {
    if (moduleCache[path]) return moduleCache[path];
    const src = FILES[path];
    if (src === undefined) throw new Error('Module not found: ' + path);

    let code;
    if (path.endsWith('.css')) {
      code = makeCssModule(src, path);
    } else {
      code = transformJs(src, path);

      // Find every relative dep and pre-load it
      const deps = [];
      let m;
      const re = new RegExp(IMPORT_RE.source, 'g');
      while ((m = re.exec(code)) !== null) {
        const spec = m[3];
        const resolved = resolvePath(path, spec);
        if (resolved) deps.push({ spec, resolved });
      }
      const depUrls = {};
      for (const d of deps) {
        depUrls[d.spec] = await loadModule(d.resolved);
      }
      const re2 = new RegExp(IMPORT_RE.source, 'g');
      code = code.replace(re2, function(_full, prefix, q, spec, q2){
        if (depUrls[spec]) return prefix + q + depUrls[spec] + q2;
        return _full;
      });
    }

    const blob = new Blob([code], { type: 'text/javascript' });
    const url = URL.createObjectURL(blob);
    moduleCache[path] = url;
    return url;
  }

  (async () => {
    try {
      const entryUrl = await loadModule(ENTRY);
      await import(entryUrl);
    } catch (err) {
      console.error('[Webly]', err);
      const msg = (err && err.stack) ? err.stack : String(err);
      document.getElementById('root').innerHTML =
        '<div style="padding:24px;font-family:ui-monospace,monospace;direction:ltr;text-align:left;min-height:100vh;background:#0f172a">' +
        '<h2 style="color:#f87171;margin:0 0 12px">Webly Runtime Error</h2>' +
        '<pre style="white-space:pre-wrap;color:#fecaca;background:#1e293b;padding:16px;border-radius:8px;border:1px solid #b91c1c;font-size:13px">' +
        msg.replace(/[&<>]/g, function(c){ return ({ '&':'&amp;','<':'&lt;','>':'&gt;' })[c]; }) +
        '</pre></div>';
    }
  })();
</script>
